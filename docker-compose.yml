version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: local-postgres16
    restart: always
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tdengine:
    image: tdengine/tdengine:3.3.4.3
    container_name: local-tdengine3
    restart: always
    ports:
      - "6030:6030"
      - "6041:6041"
    volumes:
      - ./tdengine-data:/var/lib/taos
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6041/rest/sql -d 'SELECT SERVER_VERSION()' -u root:taosdata"]
      interval: 10s
      timeout: 5s
      retries: 10

version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: local-mysql8
    restart: always
    ports:
      - "3306:3306"
    env_file: .env
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "${MYSQL_USER}", "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: python:3.11-slim
    container_name: local-app
    working_dir: /app
    volumes:
      - .:/app
    env_file: sim_config.env
    depends_on:
      mysql:
        condition: service_healthy
      tdengine:
        condition: service_healthy
    command: >
      bash -c "pip install pymysql aiohttp numpy requests --quiet &&
               tail -f /dev/null"
    restart: always

  tdengine:
    image: tdengine/tdengine:3.3.4.3
    container_name: local-tdengine3
    restart: always
    ports:
      - "6030:6030"
      - "6041:6041"
      - "6060:6060"
    volumes:
      - ./tdengine-data:/var/lib/taos
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6041/rest/sql -d 'SELECT SERVER_VERSION()' -u root:taosdata"]
      interval: 10s
      timeout: 5s
      retries: 10
